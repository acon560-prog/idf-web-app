name: Deploy to Cloud Run (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: civispec-4182
  REGION: us-central1
  SERVICE: civispec-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client app
        env:
          REACT_APP_API_BASE_URL: /api
        run: npm run build --prefix client

      - name: Sync frontend build into server/build
        run: |
          rm -rf server/build
          mkdir -p server/build
          rsync -a --delete client/build/ server/build/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_CONSULTANT_MONTHLY: ${{ secrets.STRIPE_PRICE_CONSULTANT_MONTHLY }}
          STRIPE_PRICE_MUNICIPAL_ANNUAL: ${{ secrets.STRIPE_PRICE_MUNICIPAL_ANNUAL }}
          STRIPE_PRICE_LIFETIME: ${{ secrets.STRIPE_PRICE_LIFETIME }}
          STRIPE_TRIAL_VERIFICATION_AMOUNT_CENTS: ${{ secrets.STRIPE_TRIAL_VERIFICATION_AMOUNT_CENTS }}
        run: |
          if [ -z "$STRIPE_SECRET_KEY" ] || [ -z "$STRIPE_WEBHOOK_SECRET" ] || [ -z "$STRIPE_PRICE_CONSULTANT_MONTHLY" ]; then
            echo "Missing required Stripe deploy secret(s)."
            echo "Required: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRICE_CONSULTANT_MONTHLY"
            exit 1
          fi
          gcloud run deploy "$SERVICE" \
            --source server \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --update-env-vars "FRONTEND_URL=${FRONTEND_URL},STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY},STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET},STRIPE_PRICE_CONSULTANT_MONTHLY=${STRIPE_PRICE_CONSULTANT_MONTHLY},STRIPE_PRICE_MUNICIPAL_ANNUAL=${STRIPE_PRICE_MUNICIPAL_ANNUAL},STRIPE_PRICE_LIFETIME=${STRIPE_PRICE_LIFETIME},STRIPE_TRIAL_VERIFICATION_AMOUNT_CENTS=${STRIPE_TRIAL_VERIFICATION_AMOUNT_CENTS}" \
            --quiet
