name: Deploy to Cloud Run (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  PROJECT_ID: civispec-4182
  REGION: us-central1
  SERVICE: civispec-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Build client app
        env:
          REACT_APP_API_BASE_URL: /api
        run: npm run build --prefix client

      - name: Sync frontend build into server/build
        run: |
          rm -rf server/build
          mkdir -p server/build
          rsync -a --delete client/build/ server/build/

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        env:
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        run: |
          # Use Google Secret Manager-backed env vars on Cloud Run.
          # This avoids type conflicts when variables are configured as "secret refs".
          DEPLOY_ARGS=(
            "$SERVICE"
            --source server
            --project "$PROJECT_ID"
            --region "$REGION"
            --allow-unauthenticated
            --remove-env-vars "STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PRICE_CONSULTANT_MONTHLY,MONGO_URI,JWT_SECRET_KEY"
            --update-secrets "STRIPE_SECRET_KEY=stripe_secret_key:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_CONSULTANT_MONTHLY=STRIPE_PRICE_MONTHLY:latest,MONGO_URI=mongo_uri:latest,JWT_SECRET_KEY=jwt_secret_key:latest"
          )
          if [ -n "$FRONTEND_URL" ]; then
            DEPLOY_ARGS+=(--update-env-vars "FRONTEND_URL=${FRONTEND_URL}")
          fi
          gcloud run deploy "${DEPLOY_ARGS[@]}" --quiet
