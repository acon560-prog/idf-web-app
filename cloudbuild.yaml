steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - GOOGLE_PLACES_KEY
    args:
      - -c
      - |
        set -euo pipefail
        docker build \
          -t "$_IMAGE_URI" \
          --build-arg REACT_APP_GOOGLE_PLACES_API_KEY="$$GOOGLE_PLACES_KEY" \
          .

images:
  - "$_IMAGE_URI"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/REACT_APP_GOOGLE_PLACES_API_KEY/versions/latest
      env: GOOGLE_PLACES_KEY

substitutions:
  _IMAGE_URI: ""

